// ─── REDUX STORE ──────────────────────────────────────────────────────────────
const { createStore } = Redux;
const { Provider, useDispatch, useSelector } = ReactRedux;

const initialState = {
  activeSection: "home",
  activeProjectFilter: "All",
  mobileMenuOpen: false,
  activeSkillCategory: "AI & GenAI",
};

function reducer(state = initialState, action) {
  switch (action.type) {
    case "SET_SECTION": return { ...state, activeSection: action.payload };
    case "SET_PROJECT_FILTER": return { ...state, activeProjectFilter: action.payload };
    case "TOGGLE_MOBILE_MENU": return { ...state, mobileMenuOpen: !state.mobileMenuOpen };
    case "CLOSE_MOBILE_MENU": return { ...state, mobileMenuOpen: false };
    case "SET_SKILL_CATEGORY": return { ...state, activeSkillCategory: action.payload };
    default: return state;
  }
}

const store = createStore(reducer);
const actions = {
  setSection: (p) => ({ type: "SET_SECTION", payload: p }),
  setFilter: (p) => ({ type: "SET_PROJECT_FILTER", payload: p }),
  toggleMenu: () => ({ type: "TOGGLE_MOBILE_MENU" }),
  closeMenu: () => ({ type: "CLOSE_MOBILE_MENU" }),
  setSkillCat: (p) => ({ type: "SET_SKILL_CATEGORY", payload: p }),
};

    window.addEventListener("scroll", fn);
    return () => window.removeEventListener("scroll", fn);
  }, []);

  const scrollTo = (id) => {
    document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
    dispatch(actions.closeMenu());
  };

  const navLinks = [
    { id: "about", label: "About" },
    { id: "skills", label: "Skills" },
    { id: "projects", label: "Projects" },
    { id: "experience", label: "Experience" },
    { id: "contact", label: "Contact" },
  ];

  return (
    <nav style={{
      position: "fixed", top: 0, width: "100%", zIndex: 100,
      background: scrolled ? "rgba(3,7,18,0.92)" : "transparent",
      backdropFilter: scrolled ? "blur(16px)" : "none",
      borderBottom: scrolled ? "1px solid rgba(6,182,212,0.12)" : "none",
      transition: "all 0.3s ease",
    }}>

          onMouseLeave={e => { e.target.style.borderColor = "rgba(255,255,255,0.12)"; e.target.style.color = "#d1d5db"; }}>
            Get In Touch
          </a>
        </div>

        {/* Stats */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "12px", maxWidth: "560px", margin: "0 auto" }}>
          {stats.map(stat => (
            <div key={stat.label} style={{
              background: "rgba(17,24,39,0.6)",
              border: "1px solid rgba(255,255,255,0.06)",
              borderRadius: "14px", padding: "18px 12px",
              backdropFilter: "blur(8px)",
            }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "22px", fontWeight: 700, color: "#22d3ee" }}>{stat.value}</div>
              <div style={{ fontSize: "10px", color: "#6b7280", marginTop: "6px", fontWeight: 500 }}>{stat.label}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── ABOUT ────────────────────────────────────────────────────────────────────
function AboutSection() {
  const { personal, about, education, certifications } = PORTFOLIO_DATA;

  return (
    <section id="about" style={{ padding: "112px 24px", maxWidth: "1100px", margin: "0 auto" }}>
      <SectionHeader label="About" title="The Developer Behind the Code" />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "64px", marginTop: "64px", alignItems: "start" }} className="about-grid">
        <div>
          <p style={{ color: "#d1d5db", lineHeight: 1.85, fontSize: "17px", fontWeight: 300, marginBottom: "32px" }}>{about}</p>
          <div style={{ display: "flex", gap: "24px", flexWrap: "wrap" }}>
            {[
              { href: personal.github, icon: <IconGithub />, label: "GitHub" },
              { href: personal.linkedin, icon: <IconLinkedin />, label: "LinkedIn" },
              { href: `mailto:${personal.email}`, icon: <IconMail />, label: "Email" },
            ].map(link => (
              <a key={link.label} href={link.href} style={{
                display: "flex", alignItems: "center", gap: "8px",
                color: "#6b7280", fontSize: "13px",
                fontFamily: "'JetBrains Mono', monospace",
                textDecoration: "none", transition: "color 0.2s",
              }}
              onMouseEnter={e => e.currentTarget.style.color = "#22d3ee"}
              onMouseLeave={e => e.currentTarget.style.color = "#6b7280"}>
                {link.icon}<span>{link.label}</span>
              </a>
            ))}
          </div>
        </div>

        <div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "10px", color: "#6b7280", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: "20px" }}>
            Education & Certifications
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: "14px" }}>
            {education.map(ed => (
              <div key={ed.degree} style={{
                padding: "18px 20px",
                background: ed.highlight ? "linear-gradient(135deg, rgba(46,16,101,0.3), rgba(8,47,73,0.3))" : "rgba(17,24,39,0.4)",
                border: ed.highlight ? "1px solid rgba(139,92,246,0.3)" : "1px solid rgba(255,255,255,0.06)",
                borderRadius: "14px",
              }}>
                {ed.highlight && (
                  <div style={{
                    display: "inline-block", fontSize: "10px", fontFamily: "'JetBrains Mono', monospace",
                    color: "#a78bfa", background: "rgba(46,16,101,0.5)",
                    padding: "3px 10px", borderRadius: "999px", marginBottom: "8px",
                  }}>In Progress</div>
                )}
                <div style={{ fontSize: "13px", fontWeight: 600, color: "white", lineHeight: 1.4 }}>{ed.degree}</div>
                <div style={{ fontSize: "11px", color: "#6b7280", marginTop: "6px" }}>{ed.institution} · {ed.period}</div>
              </div>
            ))}

            {certifications.map(cert => (
              <div key={cert.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                <div>
                  <div style={{ fontSize: "13px", color: "#d1d5db" }}>{cert.name}</div>
                  <div style={{ fontSize: "11px", color: "#6b7280" }}>{cert.issuer}</div>
                </div>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "11px", color: "#6b7280" }}>{cert.year}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

// ─── SKILLS ───────────────────────────────────────────────────────────────────
function SkillsSection() {
  const dispatch = useDispatch();
  const { activeSkillCategory } = useSelector(s => s);
  const { skills } = PORTFOLIO_DATA;
  const categories = Object.keys(skills);

  return (
    <section id="skills" style={{ padding: "112px 24px", background: "rgba(17,24,39,0.3)" }}>
      <div style={{ maxWidth: "1100px", margin: "0 auto" }}>
        <SectionHeader label="Skills" title="Technical Arsenal" />

        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginTop: "48px", marginBottom: "40px" }}>
          {categories.map(cat => (
            <button key={cat} onClick={() => dispatch(actions.setSkillCat(cat))} style={{
              padding: "9px 20px", borderRadius: "10px", cursor: "pointer",
              fontFamily: "'JetBrains Mono', monospace", fontSize: "12px",
              border: "1px solid",
              background: activeSkillCategory === cat ? "#22d3ee" : "rgba(17,24,39,0.8)",
              borderColor: activeSkillCategory === cat ? "#22d3ee" : "rgba(255,255,255,0.08)",
              color: activeSkillCategory === cat ? "#030712" : "#9ca3af",
              fontWeight: activeSkillCategory === cat ? 600 : 400,
              transition: "all 0.2s",
            }}>
              {cat}
            </button>
          ))}
        </div>

        <div style={{ display: "grid", gap: "20px", maxWidth: "700px" }}>
          {skills[activeSkillCategory].map(skill => (
            <div key={skill.name}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "8px" }}>
                <span style={{ fontSize: "14px", color: "#e5e7eb", fontWeight: 500 }}>{skill.name}</span>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "12px", color: "#22d3ee" }}>{skill.level}%</span>
              </div>
              <div style={{ height: "4px", background: "rgba(255,255,255,0.06)", borderRadius: "999px", overflow: "hidden" }}>
                <div style={{
                  height: "100%",
                  width: `${skill.level}%`,
                  background: "linear-gradient(90deg, #22d3ee, #3b82f6)",
                  borderRadius: "999px",
                  transition: "width 0.7s ease-out",
                }} />
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── PROJECTS ─────────────────────────────────────────────────────────────────
function ProjectCard({ project }) {
  const [hovered, setHovered] = useState(false);
  const isAI = project.category === "AI";

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        display: "flex", flexDirection: "column",
        padding: "24px",
        background: isAI
          ? "linear-gradient(135deg, rgba(17,24,39,0.9), rgba(8,47,73,0.15))"
          : "rgba(17,24,39,0.7)",
        border: `1px solid ${hovered ? (isAI ? "rgba(6,182,212,0.35)" : "rgba(255,255,255,0.12)") : (isAI ? "rgba(6,182,212,0.15)" : "rgba(255,255,255,0.05)")}`,
        borderRadius: "20px",
        transition: "all 0.3s ease",
        transform: hovered ? "translateY(-4px)" : "translateY(0)",
        boxShadow: hovered ? `0 20px 60px ${isAI ? "rgba(6,182,212,0.1)" : "rgba(0,0,0,0.3)"}` : "none",
        cursor: "default",
      }}
    >
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "16px" }}>
        <div style={{
          width: "40px", height: "40px", borderRadius: "12px",
          background: isAI ? "rgba(6,182,212,0.1)" : "rgba(59,130,246,0.1)",
          color: isAI ? "#22d3ee" : "#60a5fa",
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          {isAI ? <IconBrain /> : <IconCode />}
        </div>
        <span style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: "10px", padding: "3px 10px", borderRadius: "999px",
          color: project.status === "live" ? "#4ade80" : "#fbbf24",
          background: project.status === "live" ? "rgba(20,83,45,0.4)" : "rgba(78,52,11,0.4)",
        }}>
          {project.status === "live" ? "● live" : "⚡ building"}
        </span>
      </div>

      <h3 style={{
        fontFamily: "'Syne', sans-serif", fontSize: "17px", fontWeight: 700,
        color: hovered ? (isAI ? "#22d3ee" : "white") : "white",
        marginBottom: "10px", transition: "color 0.3s",
      }}>{project.title}</h3>

      <p style={{ color: "#6b7280", fontSize: "13px", lineHeight: 1.7, marginBottom: "20px", flex: 1 }}>{project.description}</p>

      <div style={{ display: "flex", flexWrap: "wrap", gap: "6px", marginBottom: "20px" }}>
        {project.tags.map(tag => (
          <span key={tag} style={{
            fontSize: "11px", padding: "4px 10px",
            background: "rgba(255,255,255,0.04)",
            border: "1px solid rgba(255,255,255,0.07)",
            color: "#9ca3af", borderRadius: "6px",
            fontFamily: "'JetBrains Mono', monospace",
          }}>{tag}</span>
        ))}
      </div>

      <div style={{ display: "flex", gap: "16px" }}>
        <a href="#" style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", color: "#6b7280", textDecoration: "none", fontFamily: "'JetBrains Mono', monospace", transition: "color 0.2s" }}
          onMouseEnter={e => e.currentTarget.style.color = "#fff"}
          onMouseLeave={e => e.currentTarget.style.color = "#6b7280"}>
          <IconGithub /><span>Code</span>
        </a>
        <a href="#" style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", color: "#6b7280", textDecoration: "none", fontFamily: "'JetBrains Mono', monospace", transition: "color 0.2s" }}
          onMouseEnter={e => e.currentTarget.style.color = "#22d3ee"}
          onMouseLeave={e => e.currentTarget.style.color = "#6b7280"}>
          <IconLink /><span>Live</span>
        </a>
      </div>
    </div>
  );
}

function ProjectsSection() {
  const dispatch = useDispatch();
  const { activeProjectFilter } = useSelector(s => s);
  const { projects } = PORTFOLIO_DATA;
  const filters = ["All", "AI", "Web"];
  const filtered = activeProjectFilter === "All" ? projects : projects.filter(p => p.category === activeProjectFilter);

  return (
    <section id="projects" style={{ padding: "112px 24px", maxWidth: "1100px", margin: "0 auto" }}>
      <SectionHeader label="Projects" title="Things I've Built" />

      <div style={{ display: "flex", gap: "8px", marginTop: "48px", marginBottom: "40px" }}>
        {filters.map(f => (
          <button key={f} onClick={() => dispatch(actions.setFilter(f))} style={{
            padding: "9px 20px", borderRadius: "10px", cursor: "pointer",
            fontFamily: "'JetBrains Mono', monospace", fontSize: "12px",
            border: "1px solid",
            background: activeProjectFilter === f ? "#22d3ee" : "rgba(17,24,39,0.8)",
            borderColor: activeProjectFilter === f ? "#22d3ee" : "rgba(255,255,255,0.08)",
            color: activeProjectFilter === f ? "#030712" : "#9ca3af",
            fontWeight: activeProjectFilter === f ? 600 : 400,
            transition: "all 0.2s",
          }}>
            {f}
          </button>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: "20px" }}>
        {filtered.map(project => <ProjectCard key={project.title} project={project} />)}
      </div>
    </section>
  );
}

// ─── EXPERIENCE ───────────────────────────────────────────────────────────────
function ExperienceSection() {
  const { experience } = PORTFOLIO_DATA;

  return (
    <section id="experience" style={{ padding: "112px 24px", background: "rgba(17,24,39,0.3)" }}>
      <div style={{ maxWidth: "1100px", margin: "0 auto" }}>
        <SectionHeader label="Experience" title="Where I've Worked" />

        <div style={{ marginTop: "64px", position: "relative", paddingLeft: "48px" }}>
          {/* Timeline */}
          <div style={{ position: "absolute", left: "12px", top: 0, bottom: 0, width: "1px", background: "linear-gradient(to bottom, #22d3ee, rgba(59,130,246,0.3), transparent)" }} />

          <div style={{ display: "flex", flexDirection: "column", gap: "56px" }}>
            {experience.map((exp, i) => (
              <div key={exp.company} style={{ position: "relative" }}>
                {/* Dot */}
                <div style={{ position: "absolute", left: "-42px", top: "4px", width: "12px", height: "12px", borderRadius: "50%", background: "#22d3ee", border: "2px solid #030712", boxShadow: "0 0 12px rgba(34,211,238,0.4)" }} />

                <div style={{ marginBottom: "16px" }}>
                  <h3 style={{ fontFamily: "'Syne', sans-serif", fontSize: "22px", fontWeight: 700, color: "white", margin: "0 0 6px" }}>{exp.role}</h3>
                  <div style={{ display: "flex", alignItems: "center", gap: "12px", flexWrap: "wrap" }}>
                    <span style={{ color: "#22d3ee", fontSize: "14px", fontWeight: 600 }}>{exp.company}</span>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "11px", color: "#6b7280", background: "rgba(255,255,255,0.05)", padding: "3px 10px", borderRadius: "6px" }}>{exp.period}</span>
                    {exp.type === "consulting" && (
                      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "11px", color: "#a78bfa", background: "rgba(46,16,101,0.3)", border: "1px solid rgba(139,92,246,0.25)", padding: "3px 10px", borderRadius: "6px" }}>Consulting</span>
                    )}
                  </div>
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                  {exp.highlights.map((h, j) => (
                    <div key={j} style={{ display: "flex", alignItems: "flex-start", gap: "12px" }}>
                      <span style={{ color: "#22d3ee", marginTop: "1px", flexShrink: 0, fontFamily: "'JetBrains Mono', monospace" }}>→</span>
                      <span style={{ color: "#9ca3af", fontSize: "14px", lineHeight: 1.6 }}>{h}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

// ─── CONTACT ──────────────────────────────────────────────────────────────────
function ContactSection() {
  const { personal } = PORTFOLIO_DATA;
  return (
    <section id="contact" style={{ padding: "112px 24px", maxWidth: "1100px", margin: "0 auto" }}>
      <div style={{
        position: "relative",
        background: "linear-gradient(135deg, rgba(17,24,39,0.9), rgba(8,47,73,0.2), rgba(17,24,39,0.9))",
        border: "1px solid rgba(6,182,212,0.15)",
        borderRadius: "28px",
        padding: "clamp(48px, 8vw, 96px)",
        textAlign: "center",
        overflow: "hidden",
      }}>
        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at top, rgba(6,182,212,0.07), transparent 60%)", pointerEvents: "none" }} />

        <div style={{ position: "relative" }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "11px", color: "#22d3ee", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: "16px" }}>
            Let's Build Together
          </div>
          <h2 style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: "clamp(28px, 5vw, 48px)", color: "white", margin: "0 0 20px", lineHeight: 1.2 }}>
            Have an AI project in mind?
          </h2>
          <p style={{ color: "#9ca3af", maxWidth: "500px", margin: "0 auto 48px", lineHeight: 1.8, fontSize: "16px" }}>
            Whether you need to integrate LLMs into your product, build agentic workflows, or develop intelligent applications — let's talk.
          </p>

          <div style={{ display: "flex", gap: "16px", justifyContent: "center", flexWrap: "wrap" }}>
            <a href={`mailto:${personal.email}`} style={{
              display: "flex", alignItems: "center", gap: "10px",
              padding: "14px 32px",
              background: "linear-gradient(135deg, #22d3ee, #3b82f6)",
              color: "white", fontWeight: 600, borderRadius: "12px",
              border: "none", textDecoration: "none", fontSize: "14px",
              fontFamily: "'Syne', sans-serif",
              boxShadow: "0 8px 32px rgba(34,211,238,0.2)",
              transition: "opacity 0.2s",
            }}
            onMouseEnter={e => e.currentTarget.style.opacity = "0.88"}
            onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
              <IconMail /><span>Send a Message</span>
            </a>
            <a href={personal.linkedin} style={{
              display: "flex", alignItems: "center", gap: "10px",
              padding: "14px 32px",
              background: "rgba(255,255,255,0.06)",
              color: "#d1d5db", fontWeight: 600, borderRadius: "12px",
              border: "1px solid rgba(255,255,255,0.1)", textDecoration: "none", fontSize: "14px",
              fontFamily: "'Syne', sans-serif",
              transition: "background 0.2s",
            }}
            onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.1)"}
            onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.06)"}>
              <IconLinkedin /><span>Connect on LinkedIn</span>
            </a>
          </div>
        </div>
      </div>
    </section>
  );
}

// ─── FOOTER ───────────────────────────────────────────────────────────────────
function Footer() {
  return (
    <footer style={{ padding: "28px 24px", borderTop: "1px solid rgba(255,255,255,0.05)", textAlign: "center" }}>
      <p style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "12px", color: "#4b5563" }}>
        {PORTFOLIO_DATA.personal.name} · {new Date().getFullYear()} · React + Redux + Tailwind
      </p>
    </footer>
  );
}

// ─── RESPONSIVE ───────────────────────────────────────────────────────────────
const style = document.createElement("style");
style.textContent = `
  @media (max-width: 768px) {
    .about-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .hidden { display: none !important; }
  }
  @media (min-width: 769px) {
    .md\\:flex { display: flex !important; }
    .md\\:hidden { display: none !important; }
  }
`;
document.head.appendChild(style);

// ─── APP ──────────────────────────────────────────────────────────────────────
function AppContent() {
  return (
    <div style={{ minHeight: "100vh", background: "#030712", color: "white", fontFamily: "'Syne', sans-serif" }}>
      <Navbar />
      <HeroSection />
      <AboutSection />
      <SkillsSection />
      <ProjectsSection />
      <ExperienceSection />
      <ContactSection />
      <Footer />
    </div>
  );
}

function App() {
  return (
    <Provider store={store}>
      <AppContent />
    </Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
